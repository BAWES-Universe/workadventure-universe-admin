name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        run: |
          set -o pipefail
          npx jest __tests__/lib/ 2>&1 | tail -30

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_PLAY_URL=${{ vars.NEXT_PUBLIC_PLAY_URL || secrets.NEXT_PUBLIC_PLAY_URL || 'http://play.workadventure.localhost' }}

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # ─────────────────────────────────────────────────
  # Release: auto-version, tag, and GitHub Release
  # Runs only on push to main (not PRs, not tags)
  # ─────────────────────────────────────────────────
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.calculate.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calculate
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          LATEST_VERSION="${LATEST_TAG#v}"

          echo "Package.json: $PKG_VERSION"
          echo "Latest tag:   $LATEST_TAG"

          if [ -z "$LATEST_TAG" ]; then
            # No tags exist yet — use package.json as initial version
            NEW_VERSION="$PKG_VERSION"
          elif [ "$PKG_VERSION" = "$LATEST_VERSION" ]; then
            # Match — auto-bump patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "$PKG_VERSION"
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          elif [ "$(printf '%s\n' "$PKG_VERSION" "$LATEST_VERSION" | sort -V | tail -1)" = "$PKG_VERSION" ]; then
            # package.json ahead of latest tag — use it (user bumped manually)
            NEW_VERSION="$PKG_VERSION"
          else
            # package.json behind latest tag — bump from tag instead
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.calculate.outputs.new_version }}
        run: |
          VERSION="v${NEW_VERSION}"

          # Skip if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — skipping"
            echo "new_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "BAWES Bot"
          git config user.email "bot@bawes.net"
          git tag "$VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" --generate-notes

  # ─────────────────────────────────────────────────
  # Deploy: trigger Coolify to pull the new image
  # Fires only if release produced a new version
  # ─────────────────────────────────────────────────
  deploy:
    if: needs.release.outputs.new_version != ''
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Coolify
        env:
          COOLIFY_BASE: ${{ secrets.COOLIFY_BASE }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_ADMIN_UUID: ${{ secrets.COOLIFY_ADMIN_UUID }}
        run: |
          echo "Deploying v${{ needs.release.outputs.new_version }}..."
          curl -sSf -X POST "${COOLIFY_BASE}/api/v1/deploy?uuid=${COOLIFY_ADMIN_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}"
      - name: Record GitHub deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ needs.release.outputs.new_version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DEPLOY_ID=$(printf '{"ref":"%s","environment":"admin","description":"v%s","required_contexts":[]}' "$COMMIT_SHA" "$NEW_VERSION" | \
            gh api repos/${{ github.repository }}/deployments --input - --jq '.id')
          gh api repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses \
            -f state=success \
            -f environment_url=https://universe.bawes.net \
            -f log_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

